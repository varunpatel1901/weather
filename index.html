<!DOCTYPE html>
<html>
<head>
  <title>Weather App</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0f172a;
      color: white;
    }
    .box {
      margin-top: 100px;
    }
    input {
      padding: 10px;
      border-radius: 5px;
      border: none;
    }
    button {
      padding: 10px;
      border: none;
      background: #38bdf8;
      color: black;
      border-radius: 5px;
      cursor: pointer;
    }
    .result {
      margin-top: 20px;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>🌦 Weather App</h1>
    <input type="text" id="city" placeholder="Enter city">
    <button onclick="getWeather()">Search</button>

    <div class="result" id="result"></div>
  </div>

<script>

// Replace this string with your actual OpenWeatherMap API key
const apiKey = "1a2b3c4d5e6f7g8h9i_YOUR_KEY_HERE"; 

async function getWeather() {
  let city = document.getElementById("city").value;

  // Added a check to prevent empty searches
  if (!city) {
    document.getElementById("result").innerHTML = `<p>Please enter a city.</p>`;
    return;
  }

  let url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`;

  try {
    let res = await fetch(url);
    let data = await res.json();

    if (data.cod == 200) {
      document.getElementById("result").innerHTML =
        `<h2>${data.name}</h2>
         <p>🌡 Temp: ${data.main.temp}°C</p>
         <p>☁ Condition: ${data.weather[0].main}</p>`;
    } else {
      document.getElementById("result").innerHTML =
        `<p>❌ City not found</p>`;
    }
  } catch (error) {
    document.getElementById("result").innerHTML =
        `<p>❌ Error fetching data</p>`;
    console.error(error);
  }
}


</script>
</body>
</html>
